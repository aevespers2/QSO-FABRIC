name: Dynamic Twin Boundary

on:
  pull_request:
    paths:
      - "dynamic-twin/**"
      - ".github/workflows/dynamic-twin-boundary.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dynamic-twin-boundary-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Run hostile model regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports/dynamic-twin-boundary
          python -m unittest discover -s dynamic-twin/tests -p "test_*.py" -v \
            2>&1 | tee reports/dynamic-twin-boundary/tests.txt

      - name: Compile source and tests
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q dynamic-twin/src dynamic-twin/tests \
            2>&1 | tee reports/dynamic-twin-boundary/compile.txt

      - name: Validate schemas and documentation map
        id: structure
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee reports/dynamic-twin-boundary/structure.txt
          import json
          from pathlib import Path

          required = [
              Path("dynamic-twin/README.md"),
              Path("dynamic-twin/schemas/observation.schema.json"),
              Path("dynamic-twin/schemas/twin-manifest.schema.json"),
              Path("dynamic-twin/src/qso_twins/__init__.py"),
              Path("dynamic-twin/src/qso_twins/models.py"),
              Path("dynamic-twin/tests/test_models.py"),
          ]
          for path in required:
              if not path.is_file():
                  raise SystemExit(f"missing required file: {path}")

          def reject_duplicates(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key}")
                  result[key] = value
              return result

          for path in required[1:3]:
              json.loads(
                  path.read_text(encoding="utf-8"),
                  object_pairs_hook=reject_duplicates,
                  parse_constant=lambda value: (_ for _ in ()).throw(
                      ValueError(f"non-finite JSON number: {value}")
                  ),
              )

          readme = required[0].read_text(encoding="utf-8")
          if "SPECIFICATION.md" in readme:
              raise SystemExit("README references nonexistent SPECIFICATION.md")
          for marker in (
              "bounded foundation only",
              "deeply immutable",
              "Passing this slice does not approve",
          ):
              if marker not in readme:
                  raise SystemExit(f"missing README boundary marker: {marker}")
          print("dynamic twin structure validated")
          PY

      - name: Create deterministic evidence
        if: always()
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          STRUCTURE_OUTCOME: ${{ steps.structure.outcome }}
        run: |
          set -euo pipefail
          mkdir -p reports/dynamic-twin-boundary/source
          git rev-parse HEAD > reports/dynamic-twin-boundary/exact-head.txt
          python --version > reports/dynamic-twin-boundary/python-version.txt 2>&1
          printf '%s\n' \
            "tests=$TEST_OUTCOME" \
            "compile=$COMPILE_OUTCOME" \
            "structure=$STRUCTURE_OUTCOME" \
            > reports/dynamic-twin-boundary/step-outcomes.txt
          cp dynamic-twin/README.md \
             dynamic-twin/src/qso_twins/models.py \
             dynamic-twin/tests/test_models.py \
             dynamic-twin/schemas/observation.schema.json \
             dynamic-twin/schemas/twin-manifest.schema.json \
             reports/dynamic-twin-boundary/source/
          sha256sum \
            dynamic-twin/README.md \
            dynamic-twin/src/qso_twins/models.py \
            dynamic-twin/tests/test_models.py \
            dynamic-twin/schemas/observation.schema.json \
            dynamic-twin/schemas/twin-manifest.schema.json \
            .github/workflows/dynamic-twin-boundary.yml \
            > reports/dynamic-twin-boundary/SHA256SUMS
          git diff --exit-code

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-fabric-dynamic-twin-boundary-${{ env.EXPECTED_HEAD }}
          path: reports/dynamic-twin-boundary
          if-no-files-found: error
          retention-days: 30

      - name: Enforce result after evidence retention
        if: always()
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          STRUCTURE_OUTCOME: ${{ steps.structure.outcome }}
        run: |
          set -euo pipefail
          test "$TEST_OUTCOME" = success
          test "$COMPILE_OUTCOME" = success
          test "$STRUCTURE_OUTCOME" = success
