name: Cryptographic Fabric

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crypto-fabric:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'

      - name: Run cryptographic-fabric tests
        run: python -m unittest discover -s tests -p 'test_crypto_fabric.py' -v

      - name: Compile package
        run: python -m compileall -q qso_runtime
