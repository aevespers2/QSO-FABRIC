name: Muse Repository Bootstrap Audit

on:
  workflow_dispatch:
    inputs:
      owner:
        description: Public GitHub owner to audit
        required: false
        default: aevespers2

permissions:
  contents: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Audit missing Muse files without writing
        id: audit
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MUSE_OWNER: ${{ inputs.owner || 'aevespers2' }}
          MUSE_DRY_RUN: "true"
          MUSE_WRITE_AUTHORIZED: "false"
          MUSE_CONTROL_REPO: ${{ github.repository }}
          MUSE_REPORT_PATH: ${{ runner.temp }}/muse-bootstrap/report.json
        run: |
          mkdir -p "${{ runner.temp }}/muse-bootstrap"
          set +e
          python .github/scripts/muse_repo_bootstrap.py \
            > "${{ runner.temp }}/muse-bootstrap/stdout.txt" \
            2> "${{ runner.temp }}/muse-bootstrap/stderr.txt"
          status=$?
          printf '%s\n' "$status" > "${{ runner.temp }}/muse-bootstrap/exit-code.txt"
          exit 0

      - name: Record immutable audit evidence
        if: always()
        run: |
          printf '%s\n' "${{ github.sha }}" > "${{ runner.temp }}/muse-bootstrap/exact-head.txt"
          printf '%s\n' "${{ github.run_id }}" > "${{ runner.temp }}/muse-bootstrap/workflow-run.txt"
          python --version > "${{ runner.temp }}/muse-bootstrap/python-version.txt" 2>&1
          sha256sum "${{ runner.temp }}/muse-bootstrap"/* > "${{ runner.temp }}/muse-bootstrap/SHA256SUMS"
          git diff --exit-code

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: muse-bootstrap-audit-${{ github.sha }}
          path: ${{ runner.temp }}/muse-bootstrap
          if-no-files-found: error
          retention-days: 90

      - name: Fail closed after evidence retention
        if: always()
        run: test "$(cat '${{ runner.temp }}/muse-bootstrap/exit-code.txt')" = "0"
