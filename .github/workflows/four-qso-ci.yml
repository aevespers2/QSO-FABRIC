name: Four QSO CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: four-qso-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_INPUT: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EXPECTED_SHA"
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: ""

      - name: Install pinned test runner
        run: python -m pip install --no-deps pytest==9.1.1

      - name: Run test suite
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p reports/four-qso-ci
          python -m pytest -q \
            --junitxml=reports/four-qso-ci/pytest.xml \
            2>&1 | tee reports/four-qso-ci/pytest.txt
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run bounded four-QSO smoke
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p reports/four-qso-ci
          python -m qso_runtime.four_qso_experiment \
            "CI bounded four-QSO collaboration smoke" \
            --seed 2987 \
            --rounds 2 \
            --output reports/four-qso-ci/four_qso_report.json
          run_status=$?
          validation_status=0
          if [ "$run_status" -eq 0 ]; then
            python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/four-qso-ci/four_qso_report.json").read_text())
          assert report["ledger_valid"] is True
          assert set(report["qsos"]) == {"atlas", "nova", "orion", "lyra"}
          PY
            validation_status=$?
          fi
          status=$(( run_status != 0 || validation_status != 0 ))
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/four-qso-ci
          printf '%s\n' "$EXPECTED_SHA" > reports/four-qso-ci/exact-head.txt
          printf 'event=%s\nref=%s\n' "${{ github.event_name }}" "${{ github.ref }}" > reports/four-qso-ci/source-context.txt
          python --version > reports/four-qso-ci/python-version.txt 2>&1
          python -m pytest --version > reports/four-qso-ci/pytest-version.txt 2>&1
          {
            printf 'tests_status=%s\n' "${{ steps.tests.outputs.status || 'not-run' }}"
            printf 'smoke_status=%s\n' "${{ steps.smoke.outputs.status || 'not-run' }}"
            printf 'authority_effect=none\n'
            printf 'deployment_effect=none\n'
          } > reports/four-qso-ci/run-summary.txt
          find reports/four-qso-ci -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > reports/four-qso-ci/SHA256SUMS

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: four-qso-ci-${{ env.EXPECTED_SHA }}
          path: reports/four-qso-ci
          if-no-files-found: error
          retention-days: 90

      - name: Enforce fail-closed completion
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.tests.outputs.status || 'not-run' }}" = "0"
          test "${{ steps.smoke.outputs.status || 'not-run' }}" = "0"
