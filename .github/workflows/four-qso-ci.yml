name: Four QSO CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: four-qso-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source and clean baseline
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install bounded test dependency
        run: python -m pip install --disable-pip-version-check pytest==8.4.1

      - name: Run repository tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/four-qso
          python -m pytest -q --junitxml=reports/four-qso/pytest.xml \
            | tee reports/four-qso/pytest.log

      - name: Run bounded four-QSO smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m qso_runtime.four_qso_experiment \
            "CI bounded four-QSO collaboration smoke" \
            --seed 2987 \
            --rounds 2 \
            --output artifacts/four_qso_report.json \
            | tee reports/four-qso/four-qso-smoke.log
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("artifacts/four_qso_report.json").read_text(encoding="utf-8")
          )
          assert report["ledger_valid"] is True
          assert set(report["qsos"]) == {"atlas", "nova", "orion", "lyra"}
          PY

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/four-qso
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" \
            > reports/four-qso/exact-head.txt
          python --version > reports/four-qso/python-version.txt 2>&1
          git status --porcelain > reports/four-qso/git-status.txt
          if [ -f artifacts/four_qso_report.json ]; then
            cp artifacts/four_qso_report.json reports/four-qso/
          fi
          sha256sum reports/four-qso/* > reports/four-qso/SHA256SUMS

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: four-qso-ci-${{ github.event.pull_request.head.sha || github.sha }}
          path: reports/four-qso
          if-no-files-found: error
          retention-days: 90
