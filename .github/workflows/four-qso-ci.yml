name: Four QSO CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: four-qso-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pytest -q
      - name: Run bounded four-QSO smoke
        run: |
          python -m qso_runtime.four_qso_experiment \
            "CI bounded four-QSO collaboration smoke" \
            --seed 2987 \
            --rounds 2 \
            --output artifacts/four_qso_report.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/four_qso_report.json').read_text())
          assert report['ledger_valid'] is True
          assert set(report['qsos']) == {'atlas', 'nova', 'orion', 'lyra'}
          PY
