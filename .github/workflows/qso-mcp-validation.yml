name: QSO MCP Validation

on:
  pull_request:
    paths:
      - "qso_mcp_server/**"
      - "qso_runtime/**"
      - "tests/test_qso_mcp_runtime.py"
      - "tests/test_qso_mcp_server.py"
      - "requirements-mcp.txt"
      - "docs/qso-mcp-server.md"
      - ".github/workflows/qso-mcp-validation.yml"
  push:
    branches: [main]
    paths:
      - "qso_mcp_server/**"
      - "qso_runtime/**"
      - "tests/test_qso_mcp_runtime.py"
      - "tests/test_qso_mcp_server.py"
      - "requirements-mcp.txt"
      - "docs/qso-mcp-server.md"
      - ".github/workflows/qso-mcp-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qso-mcp-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Initialize failure-path evidence
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/qso-mcp"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } > "$evidence/source-identity.txt"

      - name: Check out exact submitted source
        id: checkout
        continue-on-error: true
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        id: setup
        continue-on-error: true
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: ""

      - name: Assert exact clean source
        id: source
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-mcp"
          {
            test "${{ steps.checkout.outcome }}" = "success"
            test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
            git diff --exit-code
            git diff --cached --exit-code
            test -z "$(git status --porcelain --untracked-files=all)"
          } > "$evidence/source-check.log" 2>&1
          status=$?
          cat "$evidence/source-check.log"
          printf '%s\n' "$status" > "$evidence/source-check-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install, test hostile boundaries, and smoke the gateway
        id: validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-mcp"
          status=0
          {
            test "${{ steps.setup.outcome }}" = "success" || status=1
            python -m pip install --disable-pip-version-check -r requirements-mcp.txt pytest || status=1
            python -m pytest -q -p no:cacheprovider \
              tests/test_qso_mcp_runtime.py \
              tests/test_qso_mcp_server.py || status=1
            python - <<'PY' || status=1
          from pathlib import Path

          for root in (Path("qso_runtime"), Path("qso_mcp_server"), Path("tests")):
              for path in sorted(root.rglob("*.py")):
                  compile(path.read_text(encoding="utf-8"), str(path), "exec")
          PY
            python - <<'PY' || status=1
          import json

          from qso_mcp_server.runtime import QSOService

          service = QSOService(max_jobs=4)
          job = service.run("Exact-head MCP validation", seed=42, rounds=2)
          verification = service.verify_job(job["job_id"])
          assert verification["valid"] is True
          replay = service.replay(job["job_id"])
          assert replay["deterministic_match"] is True
          assert replay["guaranteed"] is False
          json.dumps(job, allow_nan=False, sort_keys=True)
          PY
            python -m qso_mcp_server.server --help >/dev/null || status=1
          } > "$evidence/validation.log" 2>&1
          cat "$evidence/validation.log"
          printf '%s\n' "$status" > "$evidence/validation-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic evidence
        id: evidence
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-mcp"
          status=0
          {
            python --version > "$evidence/python-version.txt" 2>&1 || status=1
            python -m pip --version > "$evidence/pip-version.txt" 2>&1 || status=1
            python -m pip freeze --all > "$evidence/python-dependencies.txt" 2>&1 || status=1
            git status --porcelain --untracked-files=all > "$evidence/post-validation-status.txt" || status=1
            sha256sum \
              qso_mcp_server/runtime.py \
              qso_mcp_server/server.py \
              tests/test_qso_mcp_runtime.py \
              tests/test_qso_mcp_server.py \
              requirements-mcp.txt \
              docs/qso-mcp-server.md \
              .github/workflows/qso-mcp-validation.yml \
              > "$evidence/SHA256SUMS" || status=1
            git diff --exit-code || status=1
            git diff --cached --exit-code || status=1
            test -z "$(git status --porcelain --untracked-files=all)" || status=1
          } > "$evidence/evidence-check.log" 2>&1
          cat "$evidence/evidence-check.log"
          printf '%s\n' "$status" > "$evidence/evidence-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-mcp-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/qso-mcp
          if-no-files-found: error
          retention-days: 90

      - name: Fail closed after evidence retention
        if: always()
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_OUTCOME: ${{ steps.setup.outcome }}
          SOURCE_STATUS: ${{ steps.source.outputs.status }}
          VALIDATION_STATUS: ${{ steps.validation.outputs.status }}
          EVIDENCE_STATUS: ${{ steps.evidence.outputs.status }}
        shell: bash
        run: |
          set -euo pipefail
          test "$CHECKOUT_OUTCOME" = "success"
          test "$SETUP_OUTCOME" = "success"
          test "$SOURCE_STATUS" = "0"
          test "$VALIDATION_STATUS" = "0"
          test "$EVIDENCE_STATUS" = "0"
